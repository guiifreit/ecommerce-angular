<section class="container py-4">
  <div class="d-flex justify-content-between align-items-center mb-3">
    <div>
      <h1 class="mb-0">Produtos</h1>
      <small class="text-muted">Lista básica de produtos</small>
    </div>
    <button class="btn btn-primary" (click)="mostrarFormulario = !mostrarFormulario">
      {{ mostrarFormulario ? 'Cancelar' : 'Cadastrar produto' }}
    </button>
  </div>

  <div *ngIf="mostrarFormulario" class="card mb-4">
    <div class="card-body">
      <form [formGroup]="form" (ngSubmit)="adicionarProduto()">
        <div class="row g-3 align-items-end">
          <div class="col-md-6">
            <label class="form-label">Nome</label>
            <input class="form-control" formControlName="nome" />
            <div *ngIf="form.controls['nome'].invalid && form.controls['nome'].touched" class="text-danger small">Nome é obrigatório.</div>
          </div>
          <div class="col-md-4">
            <label class="form-label">Preço (R$)</label>
            <input type="number" class="form-control" formControlName="preco" />
            <div *ngIf="form.controls['preco'].invalid && form.controls['preco'].touched" class="text-danger small">Preço inválido.</div>
          </div>
          <div class="col-md-2">
            <button class="btn btn-success w-100" type="submit" [disabled]="form.invalid">{{ editarId !== null ? 'Salvar' : 'Adicionar' }}</button>
          </div>
        </div>
      </form>
    </div>
  </div>

  <div *ngIf="(produtos().length === 0)" class="alert alert-info">Nenhum produto cadastrado.</div>

  <div class="row row-cols-1 row-cols-sm-2 row-cols-md-3 g-3">
    <div class="col" *ngFor="let p of produtos()">
      <div class="card h-100">
        <div class="card-body d-flex flex-column">
          <h5 class="card-title">{{ p.nome }}</h5>
          <p class="card-text text-muted mb-4">Preço: R$ {{ p.preco | number:'1.2-2' }}</p>
          <div class="mt-auto d-flex justify-content-between">
            <button class="btn btn-outline-primary btn-sm" (click)="iniciarEdicao(p.id)">Editar</button>
            <button class="btn btn-outline-danger btn-sm" (click)="removerProduto(p.id)">Remover</button>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>
